name: 'Set Version from Tag'
description: 'Injects the Git release tag version into project.godot'
inputs:
  project_file:
    description: 'Path to the Godot project file'
    required: false
    default: 'project.godot'
runs:
  using: 'composite'
  steps:
    - name: Inject version
      shell: bash
      run: |
        TAG_NAME="${GITHUB_REF#refs/tags/}"
        VERSION="${TAG_NAME#v}"
        if [ -z "$VERSION" ]; then
          echo "::error::VERSION is empty – GITHUB_REF ('$GITHUB_REF') does not look like a tag ref."
          exit 1
        fi
        echo "Setting version to: $VERSION"
        # Escape backslashes first, then & and / so sed replacement is safe
        ESCAPED_VERSION="$(printf '%s' "$VERSION" | sed 's/\\/\\\\/g; s/[&/]/\\&/g')"
        sed -i "s/config\/version=\"[^\"]*\"/config\/version=\"$ESCAPED_VERSION\"/" "${{ inputs.project_file }}"
        if ! grep -qF "config/version=\"$VERSION\"" "${{ inputs.project_file }}"; then
          echo "::error::Version substitution failed – expected config/version=\"$VERSION\" in ${{ inputs.project_file }}"
          exit 1
        fi
        echo "Version successfully set to '$VERSION' in ${{ inputs.project_file }}"
